# GPU variant of the RayCluster manifest.
#
# This is a DROP-IN REPLACEMENT for raycluster.yaml, not a supplement.
# Apply ONE OR THE OTHER, never both - they share the same RayCluster
# name (qwen-raycluster) on purpose so the API's RAY_ADDRESS never has
# to change between profiles.
#
# What changes vs the CPU manifest:
#   - worker image        -> local/ray-worker:2.54.1-gpu
#   - worker resources    -> 4 CPU / 16 GiB / nvidia.com/gpu: 1
#   - CPU-thread env vars -> removed (BLAS thread pins are meaningless
#                             when the model runs on the GPU)
#   - worker node placement uses a tolerations block for the standard
#     NVIDIA GPU taint (nvidia.com/gpu: NoSchedule). Most cloud GPU
#     node pools apply this taint so that non-GPU pods don't get
#     scheduled onto expensive GPU nodes.
#
# What stays the same:
#   - RayCluster name, RBAC, shared PVC mount, dashboard NodePort,
#     and head pod spec (head is still CPU-only with num-cpus=0;
#     no reason to waste a GPU on the scheduler).
#
# Prerequisites:
#   * GPU-capable nodes in the cluster
#   * NVIDIA device plugin installed (kubectl get daemonset -n kube-system
#     should show nvidia-device-plugin-daemonset)
#   * Workers can pull local/ray-worker:2.54.1-gpu. On a local k3d
#     cluster, `make build-worker-gpu load-images-gpu-k3d` does this.
#     On a cloud cluster, push to a registry and replace the image tag.
#
# The nodeSelector below is LEFT BLANK on purpose; clusters label GPU
# nodes differently (GKE: cloud.google.com/gke-accelerator, EKS:
# nvidia.com/gpu.present, on-prem: often a custom label). Fill in
# whatever your cluster uses before applying.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ray-cluster-sa
  namespace: ray
  labels:
    app.kubernetes.io/name: ray-cluster
    app.kubernetes.io/part-of: kuberay-batch-inference
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ray-cluster-role
  namespace: ray
  labels:
    app.kubernetes.io/name: ray-cluster
    app.kubernetes.io/part-of: kuberay-batch-inference
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["ray.io"]
    resources: ["rayclusters", "rayjobs", "rayservices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ray-cluster-rb
  namespace: ray
  labels:
    app.kubernetes.io/name: ray-cluster
    app.kubernetes.io/part-of: kuberay-batch-inference
subjects:
  - kind: ServiceAccount
    name: ray-cluster-sa
    namespace: ray
roleRef:
  kind: Role
  name: ray-cluster-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: qwen-raycluster
  namespace: ray
  labels:
    app.kubernetes.io/name: ray-cluster
    app.kubernetes.io/part-of: kuberay-batch-inference
    ray.io/profile: gpu
spec:
  rayVersion: "2.54.1"
  enableInTreeAutoscaling: false

  # ── Head pod (CPU-only, identical to the CPU manifest) ──
  headGroupSpec:
    serviceType: ClusterIP
    rayStartParams:
      dashboard-host: "0.0.0.0"
      num-cpus: "0"
      metrics-export-port: "8080"
    template:
      metadata:
        labels:
          app.kubernetes.io/name: ray-cluster
          app.kubernetes.io/component: head
      spec:
        serviceAccountName: ray-cluster-sa
        restartPolicy: Always
        containers:
          - name: ray-head
            image: local/ray-worker:2.54.1-cpu
            imagePullPolicy: IfNotPresent
            ports:
              - { name: gcs,       containerPort: 6379, protocol: TCP }
              - { name: dashboard, containerPort: 8265, protocol: TCP }
              - { name: client,    containerPort: 10001, protocol: TCP }
              - { name: serve,     containerPort: 8000, protocol: TCP }
              - { name: metrics,   containerPort: 8080, protocol: TCP }
            resources:
              requests: { cpu: "1", memory: "2Gi" }
              limits:   { cpu: "2", memory: "3Gi" }
            env:
              - name: RAY_PROMETHEUS_HOST
                value: "http://prometheus-server.monitoring.svc.cluster.local:80"
              - name: RAY_PROMETHEUS_NAME
                value: "Prometheus"
              - name: RAY_GRAFANA_HOST
                value: "http://grafana.monitoring.svc.cluster.local:80"
              - name: RAY_GRAFANA_IFRAME_HOST
                value: "http://127.0.0.1:3000"
              - name: HF_HOME
                value: /home/ray/.cache/huggingface
              - name: HF_HUB_DISABLE_TELEMETRY
                value: "1"
              - name: TRANSFORMERS_OFFLINE
                value: "0"
            volumeMounts:
              - name: batches
                mountPath: /data/batches
              - name: hf-cache
                mountPath: /home/ray/.cache/huggingface
            readinessProbe:
              exec:
                command: ["bash", "-c", "ray health-check"]
              initialDelaySeconds: 10
              periodSeconds: 5
              timeoutSeconds: 15
              failureThreshold: 60
            livenessProbe:
              exec:
                command: ["bash", "-c", "ray health-check"]
              initialDelaySeconds: 30
              periodSeconds: 30
              timeoutSeconds: 15
              failureThreshold: 5
        volumes:
          - name: batches
            persistentVolumeClaim:
              claimName: batches-pvc
          - name: hf-cache
            emptyDir:
              sizeLimit: 2Gi

  # ── Worker group (GPU) ──
  workerGroupSpecs:
    - groupName: gpu-workers
      replicas: 2
      minReplicas: 2
      maxReplicas: 2
      rayStartParams:
        metrics-export-port: "8080"
        # Explicitly advertise 1 GPU per worker to Ray's scheduler so
        # map_batches(num_gpus=1) actually gets placed. KubeRay usually
        # auto-derives this from resources.limits, but being explicit
        # here eliminates a class of "scheduled but never runs" bugs.
        num-gpus: "1"
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ray-cluster
            app.kubernetes.io/component: worker
            ray.io/profile: gpu
        spec:
          serviceAccountName: ray-cluster-sa
          restartPolicy: Always
          # Uncomment and edit for your cluster's GPU node label.
          # nodeSelector:
          #   cloud.google.com/gke-accelerator: nvidia-l4
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          containers:
            - name: ray-worker
              image: local/ray-worker:2.54.1-gpu
              imagePullPolicy: IfNotPresent
              resources:
                # 4 CPU / 16 GiB / 1 GPU per worker. Qwen2.5-0.5B in
                # fp16/bf16 fits comfortably in <2 GiB VRAM, so a
                # single L4 / T4 / A10 slice per worker is ample.
                # CPU/memory requests are sized for data loading and
                # Transformers' host-side buffers, not for compute.
                requests:
                  cpu: "4"
                  memory: "16Gi"
                  nvidia.com/gpu: "1"
                limits:
                  cpu: "4"
                  memory: "16Gi"
                  nvidia.com/gpu: "1"
              env:
                - name: HF_HOME
                  value: /home/ray/.cache/huggingface
                - name: HF_HUB_DISABLE_TELEMETRY
                  value: "1"
                - name: TRANSFORMERS_OFFLINE
                  value: "0"
                # No OMP/MKL/OPENBLAS pins here - those were tuned for
                # the CPU profile's 2-core container. On GPU the BLAS
                # thread count barely matters because the heavy math
                # runs on CUDA.
                - name: TOKENIZERS_PARALLELISM
                  value: "false"
              volumeMounts:
                - name: batches
                  mountPath: /data/batches
                - name: hf-cache
                  mountPath: /home/ray/.cache/huggingface
              readinessProbe:
                exec:
                  command: ["bash", "-c", "ray health-check"]
                initialDelaySeconds: 30
                periodSeconds: 10
                timeoutSeconds: 15
                failureThreshold: 30
              livenessProbe:
                exec:
                  command: ["bash", "-c", "ray health-check"]
                initialDelaySeconds: 60
                periodSeconds: 30
                timeoutSeconds: 15
                failureThreshold: 5
          volumes:
            - name: batches
              persistentVolumeClaim:
                claimName: batches-pvc
            - name: hf-cache
              emptyDir:
                sizeLimit: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: qwen-raycluster-dashboard-np
  namespace: ray
  labels:
    app.kubernetes.io/name: ray-cluster
    app.kubernetes.io/part-of: kuberay-batch-inference
spec:
  type: NodePort
  selector:
    ray.io/cluster: qwen-raycluster
    ray.io/node-type: head
  ports:
    - name: dashboard
      port: 8265
      targetPort: 8265
      nodePort: 30826
      protocol: TCP
