# RayCluster for distributed offline batch inference.
#
# Topology:
#   - 1 head pod (scheduling + dashboard + Jobs API + Ray client server)
#     with num-cpus=0 so it does NOT serve tasks itself.
#   - 2 long-running worker pods on CPU, each sized for Qwen2.5-0.5B
#     peak load in Transformers (~3-4 GiB during init, ~1.5 GiB steady).
#
# Autoscaling is DISABLED (minReplicas == maxReplicas == 2) for
# deterministic dev behavior and to avoid autoscaler churn during the
# short-lived jobs a take-home demo produces. Production would enable
# `enableInTreeAutoscaling: true` and set a (min, max) range.
#
# The FastAPI proxy submits work to this cluster via the Ray Jobs API on
# `qwen-raycluster-head-svc.ray.svc.cluster.local:8265`. The cluster
# does NOT restart per job — the workers stay warm and the actor pool
# amortizes model-load cost across every submitted batch.
---
# ─── ServiceAccount + RBAC ────────────────────────────────────────────
# Ray pods themselves don't need much — list pods/services so the Ray
# dashboard and autoscaler can introspect the cluster. Production may
# want to bind to a custom PSP / restricted PodSecurity profile here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ray-cluster-sa
  namespace: ray
  labels:
    app.kubernetes.io/name: ray-cluster
    app.kubernetes.io/part-of: kuberay-batch-inference
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ray-cluster-role
  namespace: ray
  labels:
    app.kubernetes.io/name: ray-cluster
    app.kubernetes.io/part-of: kuberay-batch-inference
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["ray.io"]
    resources: ["rayclusters", "rayjobs", "rayservices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ray-cluster-rb
  namespace: ray
  labels:
    app.kubernetes.io/name: ray-cluster
    app.kubernetes.io/part-of: kuberay-batch-inference
subjects:
  - kind: ServiceAccount
    name: ray-cluster-sa
    namespace: ray
roleRef:
  kind: Role
  name: ray-cluster-role
  apiGroup: rbac.authorization.k8s.io
---
# ─── The RayCluster itself ────────────────────────────────────────────
apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: qwen-raycluster
  namespace: ray
  labels:
    app.kubernetes.io/name: ray-cluster
    app.kubernetes.io/part-of: kuberay-batch-inference
spec:
  rayVersion: "2.54.1"
  enableInTreeAutoscaling: false

  # ── Head pod ──
  headGroupSpec:
    # ClusterIP for the auto-created head-svc — the FastAPI pod reaches
    # it via in-cluster DNS at qwen-raycluster-head-svc.ray.svc.cluster.local.
    # Host exposure of the dashboard is handled separately by the
    # qwen-raycluster-dashboard-np NodePort Service at the bottom of
    # this file, so pinning NodePort here would waste a port from the
    # 30000-32767 range for nothing.
    serviceType: ClusterIP
    rayStartParams:
      dashboard-host: "0.0.0.0"
      # num-cpus=0 keeps the head as a pure scheduler. All inference
      # lands on workerGroupSpecs.
      num-cpus: "0"
      metrics-export-port: "8080"
    template:
      metadata:
        labels:
          app.kubernetes.io/name: ray-cluster
          app.kubernetes.io/component: head
      spec:
        serviceAccountName: ray-cluster-sa
        restartPolicy: Always
        containers:
          - name: ray-head
            image: local/ray-worker:2.54.1-cpu
            imagePullPolicy: IfNotPresent
            ports:
              - { name: gcs,       containerPort: 6379, protocol: TCP }
              - { name: dashboard, containerPort: 8265, protocol: TCP }
              - { name: client,    containerPort: 10001, protocol: TCP }
              - { name: serve,     containerPort: 8000, protocol: TCP }
              - { name: metrics,   containerPort: 8080, protocol: TCP }
            resources:
              requests: { cpu: "1", memory: "2Gi" }
              limits:   { cpu: "2", memory: "3Gi" }
            env:
              # ── Monitoring integration (optional) ────────────────
              # These point the Ray dashboard at the Prometheus server
              # (for time-series queries) and the Grafana server (for
              # iframed panels). Installed via scripts/install-monitoring.sh
              # which adds both into the `monitoring` namespace. The
              # IFRAME_HOST is the BROWSER-FACING URL — with `kubectl
              # port-forward svc/grafana 3000:80` it's 127.0.0.1:3000.
              # If the monitoring stack is not installed, Ray gracefully
              # hides the metrics tab; these env vars cost nothing.
              - name: RAY_PROMETHEUS_HOST
                value: "http://prometheus-server.monitoring.svc.cluster.local:80"
              - name: RAY_PROMETHEUS_NAME
                value: "Prometheus"
              - name: RAY_GRAFANA_HOST
                value: "http://grafana.monitoring.svc.cluster.local:80"
              - name: RAY_GRAFANA_IFRAME_HOST
                value: "http://127.0.0.1:3000"

              # ── HuggingFace hub cache ────────────────────────────
              - name: HF_HOME
                value: /home/ray/.cache/huggingface
              - name: HF_HUB_DISABLE_TELEMETRY
                value: "1"
              - name: TRANSFORMERS_OFFLINE
                value: "0"
            volumeMounts:
              - name: batches
                mountPath: /data/batches
              - name: hf-cache
                mountPath: /home/ray/.cache/huggingface
            readinessProbe:
              # Ray 2.54 disables the Ray Client server by default (deprecated
              # in favor of the Jobs API, which JobSubmissionClient uses). So
              # we health-check GCS generally, not ray_client_server_handle.
              exec:
                command: ["bash", "-c", "ray health-check"]
              initialDelaySeconds: 10
              periodSeconds: 5
              timeoutSeconds: 15
              failureThreshold: 60
            livenessProbe:
              exec:
                command: ["bash", "-c", "ray health-check"]
              initialDelaySeconds: 30
              periodSeconds: 30
              timeoutSeconds: 15
              failureThreshold: 5
        volumes:
          - name: batches
            persistentVolumeClaim:
              claimName: batches-pvc
          - name: hf-cache
            emptyDir:
              sizeLimit: 2Gi

  # ── Worker group ──
  workerGroupSpecs:
    - groupName: cpu-workers
      replicas: 2
      minReplicas: 2
      maxReplicas: 2
      rayStartParams:
        metrics-export-port: "8080"
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ray-cluster
            app.kubernetes.io/component: worker
        spec:
          serviceAccountName: ray-cluster-sa
          restartPolicy: Always
          containers:
            - name: ray-worker
              image: local/ray-worker:2.54.1-cpu
              imagePullPolicy: IfNotPresent
              resources:
                # 2 CPU / 5 GiB per worker. Measured peak for Qwen2.5-0.5B
                # in Transformers FP32 on CPU is ~3.5 GiB during model init.
                # Leaving 1.5 GiB headroom for KV cache and Ray overhead.
                requests: { cpu: "2", memory: "5Gi" }
                limits:   { cpu: "2", memory: "5Gi" }
              env:
                - name: HF_HOME
                  value: /home/ray/.cache/huggingface
                - name: HF_HUB_DISABLE_TELEMETRY
                  value: "1"
                - name: TRANSFORMERS_OFFLINE
                  value: "0"
                # Pin thread pools so Transformers / Torch don't
                # oversubscribe the container's 2 CPU slot and fight
                # each other for cycles.
                - name: OMP_NUM_THREADS
                  value: "2"
                - name: MKL_NUM_THREADS
                  value: "2"
                - name: OPENBLAS_NUM_THREADS
                  value: "2"
                - name: TOKENIZERS_PARALLELISM
                  value: "false"
              volumeMounts:
                - name: batches
                  mountPath: /data/batches
                - name: hf-cache
                  mountPath: /home/ray/.cache/huggingface
              # Explicit probes override KubeRay's auto-injected dashboard-agent
              # probes, which default to timeoutSeconds:1 and fail under CPU
              # contention while the worker is still booting Ray.
              readinessProbe:
                exec:
                  command: ["bash", "-c", "ray health-check"]
                initialDelaySeconds: 30
                periodSeconds: 10
                timeoutSeconds: 15
                failureThreshold: 30
              livenessProbe:
                exec:
                  command: ["bash", "-c", "ray health-check"]
                initialDelaySeconds: 60
                periodSeconds: 30
                timeoutSeconds: 15
                failureThreshold: 5
          volumes:
            - name: batches
              persistentVolumeClaim:
                claimName: batches-pvc
            - name: hf-cache
              emptyDir:
                sizeLimit: 2Gi

---
# ─── Extra NodePort Service so `kind extraPortMappings` can expose the
#     Ray dashboard on host:8265 without a long-running port-forward.
#     KubeRay's default head-svc is ClusterIP / NodePort per serviceType
#     above; pinning the nodePort here keeps the host mapping stable.
apiVersion: v1
kind: Service
metadata:
  name: qwen-raycluster-dashboard-np
  namespace: ray
  labels:
    app.kubernetes.io/name: ray-cluster
    app.kubernetes.io/part-of: kuberay-batch-inference
spec:
  type: NodePort
  selector:
    ray.io/cluster: qwen-raycluster
    ray.io/node-type: head
  ports:
    - name: dashboard
      port: 8265
      targetPort: 8265
      nodePort: 30826
      protocol: TCP
