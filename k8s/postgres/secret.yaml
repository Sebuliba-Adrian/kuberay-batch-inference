# Postgres credentials.
#
# WARNING: plain-text Secret committed to git is only acceptable for a
# local demo. Production should use an external secret manager (Vault,
# AWS SM, Azure KV, GCP SM, sealed-secrets, or an SOPS-encrypted file).
#
# The 'stringData' form lets us keep the YAML readable — Kubernetes
# base64-encodes it at apply time.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: ray
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: kuberay-batch-inference
type: Opaque
stringData:
  POSTGRES_USER: batches
  POSTGRES_PASSWORD: batches-demo-password
  POSTGRES_DB: batches
