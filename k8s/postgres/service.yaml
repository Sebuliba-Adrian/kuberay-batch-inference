# In-cluster DNS name: postgres.ray.svc.cluster.local:5432
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ray
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: kuberay-batch-inference
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
