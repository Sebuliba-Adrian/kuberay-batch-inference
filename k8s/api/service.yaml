# Service exposing the FastAPI proxy.
#
# NodePort 30800 is pinned so the kind cluster's extraPortMappings
# (k8s/kind/kind-config.yaml) can forward host:8000 → :30800 → pod:8000.
# ClusterIP would work for cluster-internal callers but the exercise
# wants curl against localhost:8000.
apiVersion: v1
kind: Service
metadata:
  name: batch-api
  namespace: ray
  labels:
    app.kubernetes.io/name: batch-api
    app.kubernetes.io/part-of: kuberay-batch-inference
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: batch-api
  ports:
    - name: http
      port: 8000
      targetPort: http
      nodePort: 30800
      protocol: TCP
