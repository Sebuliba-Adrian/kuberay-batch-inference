# API secrets.
#
# WARNING: this Secret is committed to git ONLY because this is a local
# demo. Production must use an external secret manager (Vault, AWS SM,
# Azure KV, sealed-secrets, SOPS, etc) and this file should be deleted
# from the repo before any production rollout.
#
# `stringData` is base64-encoded by Kubernetes at apply time and lets
# the YAML stay readable.
apiVersion: v1
kind: Secret
metadata:
  name: batch-api-secret
  namespace: ray
  labels:
    app.kubernetes.io/name: batch-api
    app.kubernetes.io/part-of: kuberay-batch-inference
type: Opaque
stringData:
  # Change this before any non-local deployment. Generate with:
  #   python -c "import secrets; print(secrets.token_urlsafe(32))"
  API_KEY: "demo-api-key-change-me-in-production"
